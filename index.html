<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weaviate Developer Advocate Intern Challenge</title>
    <meta
      name="description"
      content="A premium companion microsite for the Weaviate Developer Advocate Intern Challenge PDF submission."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-shell site-shell--header">
        <a class="brand" href="#hero">
          <div class="brand-mark">
            <img src="assets/logos/WeaviateLogo.svg" alt="Weaviate logo" />
          </div>
        </a>
      </div>
    </header>

    <main>
      <section id="hero" class="hero-section">
        <div class="site-shell">
          <!-- Minimal hero, background image provides the visual focus -->
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-shell footer-grid">
        <div></div>
        <div class="footer-links">
          <a href="assets/pdf/submission.pdf" target="_blank" rel="noopener">Download the PDF</a>
          <a href="https://github.com/<your-username>/developer-advocate-intern-challenge" target="_blank" rel="noopener">View repo</a>
          <a href="https://www.linkedin.com/in/<your-profile>" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>

</html>
